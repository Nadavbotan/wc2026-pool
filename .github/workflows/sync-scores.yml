name: Sync Live Scores

on:
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch WC2026 matches
        env:
          API_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: |
          curl -s "https://api.football-data.org/v4/competitions/WC/matches?season=2026" \
            -H "X-Auth-Token: $API_TOKEN" | \
          python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          out = []
          for m in d.get('matches', []):
              out.append({
                  'id': m['id'],
                  'utcDate': m['utcDate'],
                  'status': m['status'],
                  'stage': m['stage'],
                  'group': m.get('group'),
                  'homeTeam': m['homeTeam']['name'],
                  'awayTeam': m['awayTeam']['name'],
                  'homeScore': m['score']['fullTime'].get('home'),
                  'awayScore': m['score']['fullTime'].get('away'),
              })
          print(json.dumps(out, indent=2))
          " > public/data/matches.json

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json
          git diff --staged --quiet || git commit -m "chore: sync live scores"
          git push
